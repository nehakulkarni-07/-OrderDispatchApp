name: Mendix CI - Build .mda

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: OrderDispatchApp
  MENDIX_VERSION: 10.24.16.96987
  VERSION: 1.0.0

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build the .mda with MxBuild
        shell: cmd
        run: |
          set MXBUILD="C:\Program Files\Mendix\10.24.16.96987\modeler\mxbuild.exe"
          set JAVA="C:\Program Files\Microsoft\jdk-21.0.10.7-hotspot\bin\java.exe"
          set JAVAHOME="C:\Program Files\Microsoft\jdk-21.0.10.7-hotspot"
          if not exist releases mkdir releases
          %MXBUILD% --target=package ^
            --output=releases\%APP_NAME%-%VERSION%-build%GITHUB_RUN_NUMBER%.mda ^
            --java-home=%JAVAHOME% ^
            --java-exe-path=%JAVA% ^
            %APP_NAME%.mpr

      - name: Validate build output
        shell: cmd
        run: if not exist releases\*.mda ( echo BUILD FAILED & exit 1 )

      - name: Upload .mda artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-mda-${{ github.run_number }}
          path: releases/*.mda
          retention-days: 30